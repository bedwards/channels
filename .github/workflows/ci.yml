name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint with ruff
        run: ruff check src/
        
      - name: Run tests
        run: python -m pytest tests/ -v
        
      - name: Validate YAML configs
        run: python -c "from src.core.config import ConfigLoader; c = ConfigLoader(); c.load_all_channels(); print('✅ All configs valid')"
